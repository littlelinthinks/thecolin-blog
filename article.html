            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

            // 合并连续的引用
            html = html.replace(/<\/blockquote>\n<blockquote>/g, '\n');

            // 分割线
            html = html.replace(/^---$/gm, '<hr>');

            // 粗体和斜体
            html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');

                    }
                    return '<img src="' + escapeHtml(src) + '" alt="' + escapeHtml(alt) + '" loading="lazy" onerror="this.style.display=\'none\'">';
                } catch (e) {
                    return ''; // URL解析失败，不显示图片
                }
            });

            // 表格
            html = html.replace(/\|(.+)\|/g, function(match) {
                const cells = match.split('|').filter(c => c.trim());
                return '<td>' + cells.join('</td><td>') + '</td>';
            });
            html = html.replace(/(<td>.*<\/td>\n)+/g, function(match) {
                return '<tr>' + match + '</tr>';
            });

            // 段落
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';

            // 清理空标签
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p>(<h[1-6]>)/g, '$1');
            html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
            html = html.replace(/<p>(<li>)/g, '<ul>$1');
            html = html.replace(/(<\/li>)<\/p>/g, '$1');
            html = html.replace(/<p>(<blockquote>)/g, '$1');
            html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
            html = html.replace(/<p>(<pre>)/g, '$1');
            html = html.replace(/(<\/pre>)<\/p>/g, '$1');
            html = html.replace(/<p>(<hr>)/g, '$1');
            html = html.replace(/(<\/p>)(<tr>)/g, '$2');
            html = html.replace(/(<\/tr>)(<p>)/g, '$1');
            html = html.replace(/<ul><\/ul>/g, '');

            return html;
        }

        // HTML转义函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 加载 Gitalk 评论系统
        function loadGitalk() {
            const gitalk = new Gitalk({
                clientID: 'Ov23lipyoe0GkAf2X42d', // GitHub Client ID
                clientSecret: '', // GitHub Client Secret (可选,主要用于服务端)
                repo: 'thecolin-blog', // 仓库名称
                owner: 'littlelinthinks', // GitHub 用户名
                admin: ['littlelinthinks'], // GitHub 用户名
                id: window.location.pathname, // 使用页面路径作为评论ID
                distractionFreeMode: false,
                language: 'zh-CN',
                perPage: 10
            });

            gitalk.render('gitalk-container');
        }

        // 分享到 X (Twitter)
        function shareToTwitter() {
            const titleEl = document.querySelector('.article-title');
            if (!titleEl) return;
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent(titleEl.textContent);
            window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`, '_blank', 'noopener,noreferrer');
        }

        // 分享到 Facebook
        function shareToFacebook() {
            const url = encodeURIComponent(window.location.href);
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank', 'noopener,noreferrer');
        }

        // 分享到 LinkedIn
        function shareToLinkedIn() {
            const titleEl = document.querySelector('.article-title');
            if (!titleEl) return;
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(titleEl.textContent);
            window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}&title=${title}`, '_blank', 'noopener,noreferrer');
        }

        // 通用分享函数
        function shareArticle(platform) {
            switch(platform) {
                case 'twitter':
                    shareToTwitter();
                    break;
                case 'facebook':
                    shareToFacebook();
                    break;
                case 'linkedin':
                    shareToLinkedIn();
                    break;
                case 'copy':
                    copyLink();
                    break;
                default:
                    break;
            }
        }

        // 分享到微信
        function shareToWeChat() {
            const msg = currentLang === 'zh' ? '请截图分享或复制链接发送给好友' : 'Please take a screenshot or copy the link to share';
            alert(msg);
        }

        // 复制链接
        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                const msg = currentLang === 'zh' ? '链接已复制到剪贴板！' : 'Link copied to clipboard!';
                alert(msg);
            }).catch(() => {
                // 降级方案
                const input = document.createElement('input');
                input.value = window.location.href;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                const msg = currentLang === 'zh' ? '链接已复制到剪贴板！' : 'Link copied to clipboard!';
                alert(msg);
            });
        }

        // 加载相关文章
        function loadRelatedArticles(currentArticle) {
            Promise.resolve(ARTICLES_DATA).then(articles => {
                    const relatedList = document.getElementById('relatedList');

                    // 过滤掉当前文章，按分类筛选
                    const related = articles
                        .filter(a => a.id !== currentArticle.id)
                        .filter(a => a.category === currentArticle.category)
                        .slice(0, 5);

                    if (related.length === 0) {
                        relatedList.innerHTML = `<li data-zh="暂无相关文章" data-en="No related articles">暂无相关文章</li>`;
                        return;
                    }

                    relatedList.innerHTML = related.map(a =>
                        `<li><a href="article.html?id=${a.id}" data-zh="${a.title}" data-en="${a.titleEn || a.title}">${a.title}</a></li>`
                    ).join('');
                })

        }

        // 阅读进度条
        function initScrollProgress() {
            const progressBar = document.getElementById('readingProgress');
            if (!progressBar) return;

            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY;
                const docHeight = document.documentElement.scrollHeight - window.innerHeight;
                const scrollPercent = (scrollTop / docHeight) * 100;
                progressBar.style.width = scrollPercent + '%';
            }, { passive: true });
        }

        // 返回顶部按钮
        function initBackToTop() {
            const backToTop = document.getElementById('backToTop');
            if (!backToTop) return;

            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    backToTop.classList.add('visible');
                } else {
                    backToTop.classList.remove('visible');
                }
            }, { passive: true });

            backToTop.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        }

        // 更新文章页面的meta标签
        function updateArticleMeta(article) {
            // 更新或创建meta标签
            const updateMeta = (name, content, property = false) => {
                let meta;
                if (property) {
                    meta = document.querySelector(`meta[property="${name}"]`);
                } else {
                    meta = document.querySelector(`meta[name="${name}"]`);
                }

                if (!meta) {
                    meta = document.createElement('meta');
                    if (property) {
                        meta.setAttribute('property', name);
                    } else {
                        meta.setAttribute('name', name);
                    }
                    document.head.appendChild(meta);
                }
                meta.setAttribute('content', content);
            };

            // 基础meta
            updateMeta('description', article.excerpt);
            updateMeta('keywords', article.categoryName + ',深度思考,终身学习,个人成长');
            updateMeta('author', 'Colin');

            // Open Graph
            updateMeta('og:title', article.title, true);
            updateMeta('og:description', article.excerpt, true);
            updateMeta('og:type', 'article', true);
            updateMeta('og:url', window.location.href, true);
            updateMeta('article:published_time', article.date, true);
            updateMeta('article:author', 'Colin', true);
            updateMeta('article:section', article.categoryName, true);

            // Twitter
            updateMeta('twitter:title', article.title, true);
            updateMeta('twitter:description', article.excerpt, true);

            // 结构化数据
            const schemaData = {
                "@context": "https://schema.org",
                "@type": "Article",
                "headline": article.title,
                "description": article.excerpt,
                    "author": {
                        "@type": "Person",
                        "name": "Colin"
                    },
                "datePublished": article.date,
                "dateModified": article.date,
                "mainEntityOfPage": {
                    "@type": "WebPage",
                    "@id": window.location.href
                },
                "publisher": {
                    "@type": "Organization",
                    "name": "COLIN",
                    "logo": {
                        "@type": "ImageObject",
                        "url": "https://thecolin.vip/favicon.ico"
                    }
                },
                "articleSection": article.categoryName
            };

            // 移除旧的结构化数据
            const oldSchema = document.getElementById('article-schema');
            if (oldSchema) {
                oldSchema.remove();
            }

            // 添加新的结构化数据
            const schema = document.createElement('script');
            schema.type = 'application/ld+json';
            schema.id = 'article-schema';
            schema.textContent = JSON.stringify(schemaData);
            document.head.appendChild(schema);
        }

        // ===== 语言切换功能 =====
        let currentLang = 'zh';

        function switchLanguage(lang) {
            currentLang = lang;

            // 更新按钮状态和 ARIA 属性
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.style.background = 'var(--bg-card)';
                btn.style.color = 'var(--text-secondary)';
                btn.setAttribute('aria-pressed', 'false');
                if (btn.dataset.lang === lang) {
                    btn.classList.add('active');
                    btn.style.background = 'var(--accent)';
                    btn.style.color = 'var(--button-text-dark)';
                    btn.setAttribute('aria-pressed', 'true');
                }
            });

            // 更新所有带语言数据的元素（包括动态生成的元素）
            document.querySelectorAll('[data-zh][data-en]').forEach(el => {
                const textContent = el.dataset[lang];
                if (!textContent) return;

                if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                    el.placeholder = el.dataset[lang + 'Placeholder'] || textContent;
                } else if (el.tagName === 'BUTTON' || el.tagName === 'A' || el.tagName === 'SPAN' || el.tagName === 'P' || el.tagName === 'DIV' || el.tagName === 'H1' || el.tagName === 'H2' || el.tagName === 'H3' || el.tagName === 'H4' || el.tagName === 'H5') {
                    el.textContent = textContent;
                } else {
                    el.innerHTML = textContent;
                }
            });

            // 更新title属性
            document.querySelectorAll('[data-zh-title][data-en-title]').forEach(el => {
                el.setAttribute('title', el.dataset[lang + 'Title']);
            });

            // 更新页面语言属性
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';

            // 如果文章已加载，重新加载文章以更新语言
            const urlParams = new URLSearchParams(window.location.search);
            const articleId = urlParams.get('id');
            if (articleId && document.querySelector('.article-title')) {
                // 文章已经渲染，更新文章标题
                const articleTitle = document.querySelector('.article-title');
                if (articleTitle && articleTitle.dataset[lang]) {
                    articleTitle.textContent = articleTitle.dataset[lang];
                }
            }

            // 保存语言偏好
            localStorage.setItem('preferred-lang', lang);
        }

        function initLanguage() {
            const savedLang = localStorage.getItem('preferred-lang') || 'zh';
            currentLang = savedLang;
            switchLanguage(savedLang);
        }

        // 绑定语言切换按钮
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                switchLanguage(btn.dataset.lang);
            });
        });

        // ===== 主题切换功能 =====
        let currentTheme = localStorage.getItem('preferred-theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);

            const themeIcon = document.querySelector('.theme-icon');
            const themeSwitcher = document.querySelector('.theme-switcher');
            if (themeIcon) {
                themeIcon.textContent = currentTheme === 'dark' ? '🌙' : '☀️';
            }
            if (themeSwitcher) {
                themeSwitcher.setAttribute('aria-pressed', currentTheme === 'dark' ? 'true' : 'false');
                themeSwitcher.setAttribute('aria-label', currentTheme === 'dark' ? '切换到浅色主题' : '切换到深色主题');
            }

            localStorage.setItem('preferred-theme', currentTheme);
        }

        // 页面加载完成后初始化主题和语言
        window.addEventListener('DOMContentLoaded', () => {
            document.documentElement.setAttribute('data-theme', currentTheme);

            const themeIcon = document.querySelector('.theme-icon');
            if (themeIcon) {
                themeIcon.textContent = currentTheme === 'dark' ? '🌙' : '☀️';
            }

            // 初始化语言
            initLanguage();
        });

        const themeSwitcher = document.querySelector('.theme-switcher');
        if (themeSwitcher) {
            themeSwitcher.addEventListener('click', toggleTheme);
        }
    </script>
